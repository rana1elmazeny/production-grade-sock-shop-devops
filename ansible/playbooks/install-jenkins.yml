---
- name: Install Jenkins server with Docker, AWS CLI, Trivy and swap
  hosts: jenkins
  become: true

  vars:
    jenkins_port: 8090

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - gnupg
          - ca-certificates
          - fontconfig
          - openjdk-21-jdk
          - docker.io
        state: present

    - name: Create 2GB swap file if not exists
      command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile

    - name: Set swap file permissions
      file:
        path: /swapfile
        mode: '0600'

    - name: Format swap file
      command: mkswap /swapfile
      when: ansible_swaptotal_mb == 0
      ignore_errors: true

    - name: Enable swap
      command: swapon /swapfile
      when: ansible_swaptotal_mb == 0
      ignore_errors: true

    - name: Add swap to fstab
      lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Jenkins repository key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: '0644'

    - name: Add Jenkins stable repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        filename: jenkins
        state: present

    - name: Update apt cache after adding Jenkins repository
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Change Jenkins port to 8090
      lineinfile:
        path: /etc/default/jenkins
        regexp: '^HTTP_PORT='
        line: "HTTP_PORT={{ jenkins_port }}"

    - name: Set Java 21 as default
      command: update-alternatives --set java /usr/lib/jvm/java-21-openjdk-amd64/bin/java
      ignore_errors: true

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: Install Trivy
      shell: |
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor -o /usr/share/keyrings/trivy.gpg
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" > /etc/apt/sources.list.d/trivy.list
        apt-get update
        apt-get install -y trivy
      args:
        creates: /usr/bin/trivy

    - name: Restart Jenkins
      systemd:
        name: jenkins
        enabled: yes
        state: restarted
